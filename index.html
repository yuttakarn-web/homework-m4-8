<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบติดตามการบ้าน ม.4/8</title>
  
  <!-- 1. นำเข้า Tailwind CSS สำหรับความสวยงาม -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. นำเข้าไอคอน Phosphor -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <!-- 3. นำเข้า React และ ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 4. นำเข้า Babel สำหรับอ่านโค้ด JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&display=swap');
    
    body {
      font-family: 'Noto Sans Thai', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background-color: #F8FAFC;
    }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .delay-100 { animation-delay: 0.1s; opacity: 0; }
    .delay-200 { animation-delay: 0.2s; opacity: 0; }
    
    .bento-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.05), 0 1px 3px rgba(0,0,0,0.02);
      border-radius: 24px;
    }
    
    .bento-card-hover {
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .bento-card-hover:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.02);
    }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <!-- จุดที่จะแสดงผลแอปพลิเคชัน -->
  <div id="root"></div>

  <!-- โค้ด React ทั้งหมดอยู่ที่นี่ -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==========================================
    // 🔴 URL ที่เชื่อมต่อกับ Google Sheets
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby08KZlJeDThnB_ukEhjOGrwFLi2v4G55S4VQiR8xD8CijKrT-1-gKYhR7Fo6SKFnAzSA/exec";
    // ==========================================

    const SUBJECTS = ['สังคมศึกษา', 'ประวัติศาสตร์', 'ภูมิศาสตร์', 'คณิตศาสตร์พื้นฐาน', 'ภาษาไทย', 'วิทยาศาสตร์กายภาพ', 'ภาษาอังกฤษ', 'ศิลปะ', 'หน้าที่พลเมือง', 'พลศึกษา'];

    const parseDateToYMD = (dateString) => {
      if (!dateString) return '';
      const d = new Date(dateString);
      if (isNaN(d.getTime())) return dateString; 
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    };

    function App() {
      const [user, setUser] = useState(null);
      const [studentsList, setStudentsList] = useState([]); 
      const [homeworks, setHomeworks] = useState([]);
      const [submissions, setSubmissions] = useState([]);
      const [isLoading, setIsLoading] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);
      const [connectionError, setConnectionError] = useState(false);

      const loadData = async () => {
        setIsLoading(true);
        setConnectionError(false);
        try {
          const response = await fetch(GOOGLE_SCRIPT_URL);
          const data = await response.json();
          if (data.students) setStudentsList(data.students);
          if (data.homeworks) setHomeworks(data.homeworks);
          if (data.submissions) setSubmissions(data.submissions);
        } catch (error) {
          console.error("โหลดข้อมูลล้มเหลว", error);
          setConnectionError(true);
        }
        setIsLoading(false);
      };

      useEffect(() => {
        loadData();
      }, []);

      const saveData = async (action, data) => {
        setIsSyncing(true);
        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action: action, data: data })
          });
        } catch (error) {
          alert("เกิดข้อผิดพลาดในการบันทึกข้อมูล กรุณาลองใหม่");
        }
        setIsSyncing(false);
      };

      const handleLogin = (e) => {
        e.preventDefault();
        const val = e.target.loginId.value.trim(); 
        if (val === 'representative') setUser({ role: 'rep', id: 'rep', name: 'หัวหน้าห้อง' });
        else if (val === 'teacher') setUser({ role: 'teacher', id: 'teacher', name: 'คุณครู' });
        else {
          const st = studentsList.find(s => String(s.id).trim() === val);
          if (st) setUser({ role: 'student', id: st.id, name: st.name });
          else {
            if (studentsList.length === 0) alert('⚠️ ไม่พบข้อมูลนักเรียนในระบบ\n(อาจเกิดจากยังโหลดข้อมูลไม่เสร็จ หรือฐานข้อมูลว่างเปล่า)');
            else alert(`❌ ไม่พบรหัสนักเรียน "${val}"\nลองตรวจสอบรหัสอีกครั้งนะ`);
          }
        }
      };

      const handleLogout = () => {
        setUser(null);
        loadData(); 
      };

      const AmbientBackground = () => (
        <div className="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
          <div className="absolute top-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-blue-200/30 blur-[100px] mix-blend-multiply"></div>
          <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-orange-100/40 blur-[100px] mix-blend-multiply"></div>
          <div className="absolute top-[40%] right-[20%] w-[30vw] h-[30vw] rounded-full bg-indigo-100/30 blur-[80px] mix-blend-multiply"></div>
        </div>
      );

      // --- UI หน้า Login ---
      if (!user) {
        return (
          <div className="min-h-screen flex flex-col relative selection:bg-blue-200">
            <AmbientBackground />
            
            <div className="flex-grow flex items-center justify-center p-4 sm:p-6 lg:p-8">
              <div className="max-w-6xl w-full grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch">
                
                <div className="lg:col-span-5 bento-card p-8 sm:p-12 flex flex-col justify-center relative animate-fade-in overflow-hidden">
                  <div className="absolute top-0 right-0 w-32 h-32 bg-blue-50 rounded-bl-full -z-10 opacity-60"></div>
                  
                  <div className="relative z-10 flex flex-col items-start">
                     <div className="w-16 h-16 bg-blue-600 rounded-[20px] flex items-center justify-center mb-8 shadow-lg shadow-blue-600/20 text-white">
                        <i className="ph-fill ph-book-open text-3xl"></i>
                     </div>
                     
                     <h1 className="text-4xl sm:text-5xl font-black text-slate-900 mb-3 tracking-tight">
                        ระบบติดตาม<br/><span className="text-blue-600">การบ้าน</span>
                     </h1>
                     <p className="text-slate-500 mb-8 font-medium">
                        ชั้น ม. 4/8 แผนการเรียนศิลป์สังคม
                     </p>
                  </div>
                  
                  {connectionError ? (
                    <div className="bg-red-50 p-4 rounded-2xl border border-red-100 text-red-600 mb-6">
                       <p className="font-bold flex items-center"><i className="ph-fill ph-warning-circle text-xl mr-2"></i> เชื่อมต่อไม่สำเร็จ</p>
                       <p className="text-xs mt-1 mb-3">ไม่สามารถดึงข้อมูลได้ โปรดลองอีกครั้ง</p>
                       <button onClick={loadData} className="bg-red-600 text-white px-4 py-2 rounded-xl text-sm font-bold w-full hover:bg-red-700">ลองใหม่</button>
                    </div>
                  ) : isLoading ? (
                    <div className="py-10 flex flex-col items-center">
                       <i className="ph-bold ph-arrows-clockwise text-3xl text-blue-500 animate-spin mb-4"></i>
                       <p className="text-sm font-bold text-slate-400">กำลังโหลดข้อมูล...</p>
                    </div>
                  ) : (
                    <form onSubmit={handleLogin} className="space-y-5 z-10 relative mt-4">
                      <div>
                        <label className="block text-xs font-bold text-slate-500 mb-2 ml-1">รหัสนักเรียน</label>
                        <input type="text" name="loginId" placeholder="กรอกรหัส 5 หลัก" className="w-full px-5 py-4 border-2 border-slate-100 rounded-2xl bg-slate-50 text-lg font-bold text-slate-800 outline-none focus:border-blue-500 focus:bg-white transition-all text-center placeholder-slate-300" required />
                      </div>
                      <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-blue-600/20 transition-all active:scale-[0.98] flex items-center justify-center text-lg">
                        เข้าสู่ระบบ <i className="ph-bold ph-arrow-right text-xl ml-2"></i>
                      </button>
                    </form>
                  )}
                </div>

                <div className="lg:col-span-7 grid grid-cols-1 sm:grid-cols-2 gap-6 animate-fade-in delay-100">
                   <div className="sm:col-span-2 bento-card p-6 sm:p-8 bento-card-hover">
                      <div className="flex items-center justify-between mb-6">
                         <div>
                            <h2 className="text-xl font-black text-slate-900">งานสัปดาห์นี้</h2>
                            <p className="text-slate-500 text-sm mt-0.5">วันจันทร์ - ศุกร์</p>
                         </div>
                         <div className="w-10 h-10 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center"><i className="ph-fill ph-target text-xl"></i></div>
                      </div>
                      <WeeklySchedule homeworks={homeworks} />
                   </div>

                   <div className="bento-card p-6 sm:p-8 bento-card-hover">
                      <div className="flex items-center justify-between mb-6">
                         <div>
                            <h2 className="text-xl font-black text-slate-900">ปฏิทิน</h2>
                            <p className="text-slate-500 text-sm mt-0.5">ภาพรวมทั้งเดือน</p>
                         </div>
                      </div>
                      <MonthlyCalendar homeworks={homeworks} />
                   </div>

                   {/* ส่วนแสดง Top 5 หน้าแรก */}
                   <FrontPageLeaderboard homeworks={homeworks} submissions={submissions} students={studentsList} />
                </div>
              </div>
            </div>
            <footer className="text-center py-6 text-sm text-slate-400 font-medium">พัฒนาระบบโดย: ครูก้อง (นายยุทธกานต์ อินถาอ้าย)</footer>
          </div>
        );
      }

      // --- UI หน้าหลักเมื่อ Login ผ่านแล้ว ---
      return (
        <div className="min-h-screen flex flex-col relative">
          <AmbientBackground />
          <div className="pt-4 px-4 sm:px-6 lg:px-8 z-50 sticky top-0 animate-fade-in">
            <nav className="bento-card rounded-full px-4 py-3 flex justify-between items-center max-w-7xl mx-auto border-white/80 bg-white/80">
              <div className="flex items-center space-x-3">
                <div className="bg-blue-600 p-2 rounded-full text-white shadow-sm"><i className="ph-fill ph-book-open text-xl"></i></div>
                <div className="flex flex-col">
                  <span className="font-black text-slate-900 text-lg leading-none">ระบบส่งการบ้าน</span>
                  <span className="text-[10px] text-blue-600 font-bold mt-0.5">ม. 4/8</span>
                </div>
                <div className="items-center space-x-2 ml-4 border-l border-slate-200 pl-4 hidden md:flex">
                  {isLoading && <span className="text-xs text-blue-600 bg-blue-50 px-3 py-1 rounded-full flex items-center font-bold"><i className="ph-bold ph-arrows-clockwise text-sm mr-1.5 animate-spin"></i> กำลังซิงค์...</span>}
                  {isSyncing && <span className="text-xs text-orange-600 bg-orange-50 px-3 py-1 rounded-full flex items-center font-bold"><i className="ph-fill ph-floppy-disk text-sm mr-1.5 animate-pulse"></i> กำลังบันทึก...</span>}
                </div>
              </div>
              
              <div className="flex items-center space-x-2 sm:space-x-3">
                <div className="flex items-center bg-slate-50 pr-4 pl-1.5 py-1.5 rounded-full border border-slate-100">
                  <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-black text-sm mr-2 border border-blue-200">
                    {user.name ? user.name.substring(0, 1) : "?"}
                  </div>
                  <div className="hidden sm:flex flex-col items-start">
                    <span className="text-[10px] text-slate-400 font-bold">{user.role === 'rep' ? 'หัวหน้าห้อง' : user.role === 'teacher' ? 'คุณครู' : 'นักเรียน'}</span>
                    <span className="text-sm font-bold text-slate-800 leading-none">{user.name}</span>
                  </div>
                </div>
                <button onClick={handleLogout} className="text-slate-500 hover:text-red-600 bg-white w-10 h-10 sm:w-auto sm:px-4 sm:h-11 rounded-full font-bold flex items-center justify-center transition-all border border-slate-200 hover:border-red-200 shadow-sm">
                  <i className="ph-bold ph-sign-out text-lg sm:mr-2"></i> <span className="hidden sm:inline">ออกจากระบบ</span>
                </button>
              </div>
            </nav>
          </div>

          <main className="flex-grow max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8 mt-2">
            {user.role === 'rep' && <RepDashboard homeworks={homeworks} submissions={submissions} setHomeworks={setHomeworks} setSubmissions={setSubmissions} saveData={saveData} students={studentsList} user={user} />}
            {user.role === 'student' && <StudentDashboard user={user} homeworks={homeworks} submissions={submissions} setSubmissions={setSubmissions} saveData={saveData} students={studentsList} />}
            {user.role === 'teacher' && <TeacherDashboard homeworks={homeworks} submissions={submissions} students={studentsList} />}
          </main>

          <footer className="text-center py-8 text-sm font-medium text-slate-400 animate-fade-in delay-200">
            ออกแบบและพัฒนาโดย: นายยุทธกานต์ อินถาอ้าย
          </footer>
        </div>
      );
    }

    const getStudentRankInfo = (studentId, homeworks, submissions) => {
      const now = new Date();
      const currentMonth = now.getMonth();
      const currentYear = now.getFullYear();

      const monthHws = homeworks.filter(hw => {
        const d = new Date(hw.dueDate);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
      });

      const total = monthHws.length;
      if (total === 0) return { total: 0, completed: 0, percent: 0, title: 'รอเปิดฤดูกาล', icon: <i className="ph-fill ph-tray text-xl text-slate-400"></i> };

      let completed = 0;
      monthHws.forEach(hw => {
        const sub = submissions.find(s => String(s.hwId) === String(hw.id) && String(s.studentId) === String(studentId));
        if (sub && sub.status === 'approved') completed++;
      });

      const percent = (completed / total) * 100;
      let title = '';
      let icon = null;

      if (percent === 100) { title = '👑 ตำนานแห่งห้อง'; icon = <i className="ph-fill ph-crown text-xl text-yellow-500"></i>; }
      else if (percent >= 80) { title = '🔥 ตัวตึงประจำห้อง'; icon = <i className="ph-fill ph-fire text-xl text-orange-500"></i>; }
      else if (percent >= 50) { title = '🏃 นักสู้ผู้ไม่แพ้'; icon = <i className="ph-fill ph-medal text-xl text-blue-500"></i>; }
      else if (percent > 0) { title = '🐢 สายชิลกำลังมา'; icon = <i className="ph-fill ph-star text-xl text-green-500"></i>; }
      else { title = '👻 วิญญาณเร่ร่อน'; icon = <i className="ph-fill ph-warning-circle text-xl text-slate-400"></i>; }

      return { total, completed, percent, title, icon };
    };

    function FrontPageLeaderboard({ homeworks, submissions, students }) {
      const now = new Date();
      const currentMonth = now.getMonth();
      const currentYear = now.getFullYear();

      const monthHws = homeworks.filter(hw => {
        const d = new Date(hw.dueDate);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
      });

      const totalMonthlyHws = monthHws.length;

      let rankedStudents = students.map(st => {
        let completed = 0;
        monthHws.forEach(hw => {
          const sub = submissions.find(s => String(s.hwId) === String(hw.id) && String(s.studentId) === String(st.id));
          if (sub && sub.status === 'approved') completed++;
        });
        return { ...st, completed };
      });

      // กรองเอาเฉพาะคนที่ส่งงานอย่างน้อย 1 ชิ้น เรียงลำดับจากมากไปน้อย แล้วตัดมา 5 อันดับแรก
      rankedStudents = rankedStudents.filter(st => st.completed > 0).sort((a, b) => b.completed - a.completed).slice(0, 5);

      return (
        <div className="bento-card p-6 sm:p-8 bento-card-hover flex flex-col h-full">
           <div className="flex items-center justify-between mb-5">
              <div>
                 <h2 className="text-xl font-black text-slate-900">Top 5 ประจำเดือน</h2>
                 <p className="text-slate-500 text-sm mt-0.5">ทำผลงานยอดเยี่ยมที่สุด</p>
              </div>
              <div className="w-10 h-10 bg-yellow-50 text-yellow-500 rounded-full flex items-center justify-center"><i className="ph-fill ph-ranking text-xl"></i></div>
           </div>
           
           <div className="flex-1 flex flex-col justify-center space-y-2.5">
             {totalMonthlyHws === 0 ? (
                <div className="text-center py-4 opacity-50"><i className="ph-fill ph-star text-3xl text-slate-300 mb-2"></i><p className="text-slate-500 font-bold text-sm">ยังไม่มีการบ้านในเดือนนี้</p></div>
             ) : rankedStudents.length === 0 ? (
                <div className="text-center py-4 opacity-50"><i className="ph-fill ph-ghost text-3xl text-slate-300 mb-2"></i><p className="text-slate-500 font-bold text-sm">ยังไม่มีใครส่งงานผ่าน</p></div>
             ) : (
                rankedStudents.map((st, idx) => {
                   const rank = idx + 1;
                   let rankStyle = "bg-slate-50 border-slate-100";
                   let icon = <span className="text-slate-400 font-black">{rank}</span>;
                   
                   if (rank===1) { rankStyle = "bg-gradient-to-r from-yellow-50 to-amber-50 border-yellow-200 shadow-sm"; icon = <i className="ph-fill ph-crown text-yellow-500 text-xl"></i>; }
                   else if (rank===2) { rankStyle = "bg-gradient-to-r from-slate-50 to-gray-50 border-slate-200"; icon = <i className="ph-fill ph-medal text-slate-400 text-xl"></i>; }
                   else if (rank===3) { rankStyle = "bg-gradient-to-r from-orange-50 to-orange-100/50 border-orange-200"; icon = <i className="ph-fill ph-medal text-orange-600 text-xl"></i>; }

                   return (
                     <div key={st.id} className={`flex items-center justify-between p-2.5 rounded-xl border ${rankStyle} transition-transform hover:scale-[1.02]`}>
                        <div className="flex items-center gap-3 overflow-hidden">
                           <div className="w-6 flex justify-center flex-shrink-0">{icon}</div>
                           <p className="font-bold text-sm text-slate-800 truncate">{st.name}</p>
                        </div>
                        <div className="text-xs font-black px-2 py-1 bg-white border border-slate-100 text-slate-600 rounded-lg flex-shrink-0 ml-2 shadow-sm">
                           {st.completed}/{totalMonthlyHws}
                        </div>
                     </div>
                   )
                })
             )}
           </div>
        </div>
      );
    }

    function WeeklySchedule({ homeworks }) {
      const [weekDays, setWeekDays] = useState([]);
      useEffect(() => {
        const curr = new Date();
        const diff = curr.getDate() - curr.getDay() + (curr.getDay() === 0 ? -6 : 1); 
        const monday = new Date(curr.setDate(diff));
        const days = [];
        for (let i = 0; i < 5; i++) { 
          const d = new Date(monday);
          d.setDate(monday.getDate() + i);
          days.push(d);
        }
        setWeekDays(days);
      }, []);

      const dayNames = ['จันทร์', 'อังคาร', 'พุธ', 'พฤหัสบดี', 'ศุกร์'];

      return (
        <div className="grid grid-cols-1 sm:grid-cols-5 gap-3">
          {weekDays.map((date, index) => {
            const dateString = `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
            const dueToday = homeworks.filter(hw => parseDateToYMD(hw.dueDate) === dateString);
            const isToday = new Date().toDateString() === date.toDateString();

            return (
              <div key={index} className={`flex flex-col rounded-2xl border transition-all duration-300 ${isToday ? 'border-orange-400 bg-orange-50/30 shadow-md ring-1 ring-orange-400' : 'border-slate-100 bg-slate-50/50'}`}>
                <div className={`text-center py-3 border-b ${isToday ? 'border-orange-200' : 'border-slate-100'}`}>
                  <p className={`font-black text-sm ${isToday ? 'text-orange-600' : 'text-slate-500'}`}>{dayNames[index]}</p>
                  <p className={`text-lg font-bold mt-0.5 ${isToday ? 'text-orange-800' : 'text-slate-800'}`}>{date.getDate()}</p>
                </div>
                <div className="p-3 flex-1 min-h-[120px]">
                  {dueToday.length === 0 ? (
                     <div className="flex flex-col items-center justify-center h-full opacity-30"><div className="w-4 h-1 rounded-full bg-slate-400"></div></div>
                  ) : (
                     <div className="space-y-2">
                       {dueToday.map(hw => (
                         <div key={hw.id} className="bg-white p-2.5 rounded-xl border border-slate-100 shadow-sm relative overflow-hidden">
                           <div className="absolute left-0 top-0 bottom-0 w-1 bg-orange-500"></div>
                           <p className="text-xs font-black text-slate-800 line-clamp-1 pl-1 mb-1">{hw.subject}</p>
                           <p className="text-[10px] font-medium text-slate-500 line-clamp-2 pl-1 leading-tight">{hw.detail}</p>
                         </div>
                       ))}
                     </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function MonthlyCalendar({ homeworks }) {
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDayOfMonth = new Date(year, month, 1).getDay(); 
      
      const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);
      const blanks = Array.from({ length: firstDayOfMonth }, (_, i) => i);
      const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

      return (
        <div>
          <div className="flex justify-between items-center mb-6">
            <h3 className="font-black text-lg text-slate-900">{monthNames[month]} <span className="text-slate-400 font-bold">{year + 543}</span></h3>
            <div className="flex space-x-1 border border-slate-200 rounded-full p-1 bg-white shadow-sm">
               <button onClick={()=>setCurrentMonth(new Date(year, month - 1, 1))} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-600"><i className="ph-bold ph-caret-left text-lg"></i></button>
               <button onClick={()=>setCurrentMonth(new Date(year, month + 1, 1))} className="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-600"><i className="ph-bold ph-caret-right text-lg"></i></button>
            </div>
          </div>
          <div className="grid grid-cols-7 gap-1 mb-2">
            {['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'].map(d => ( <div key={d} className={`text-center text-xs font-bold ${d==='อา'||d==='ส'?'text-orange-500':'text-slate-400'}`}>{d}</div> ))}
          </div>
          <div className="grid grid-cols-7 gap-1 sm:gap-2">
            {blanks.map(b => <div key={`blank-${b}`} className="aspect-square bg-transparent"></div>)}
            {days.map(day => {
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
              const dueHomeworks = homeworks.filter(hw => parseDateToYMD(hw.dueDate) === dateStr);
              const isToday = new Date().getDate() === day && new Date().getMonth() === month && new Date().getFullYear() === year;

              return (
                <div key={day} className={`aspect-square relative flex flex-col items-center justify-center p-1 rounded-xl transition-all ${isToday ? 'bg-blue-600 text-white font-black shadow-md' : dueHomeworks.length > 0 ? 'bg-orange-50 border border-orange-200 text-slate-900 font-bold' : 'bg-slate-50/50 border border-slate-100 text-slate-600 font-medium hover:bg-white'}`}>
                  <span className="text-sm">{day}</span>
                  {dueHomeworks.length > 0 && !isToday && <div className="absolute bottom-1 flex gap-0.5"><div className="w-1.5 h-1.5 bg-orange-500 rounded-full"></div></div>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function MonthlyLeaderboard({ homeworks, submissions, students }) {
      const now = new Date();
      const currentMonth = now.getMonth();
      const currentYear = now.getFullYear();
      const monthNames = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];

      const monthHws = homeworks.filter(hw => {
        const d = new Date(hw.dueDate);
        return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
      });

      const totalMonthlyHws = monthHws.length;

      let rankedStudents = students.map(st => {
        let completed = 0;
        monthHws.forEach(hw => {
          const sub = submissions.find(s => String(s.hwId) === String(hw.id) && String(s.studentId) === String(st.id));
          if (sub && sub.status === 'approved') completed++;
        });
        return { ...st, completed, percent: totalMonthlyHws ? (completed / totalMonthlyHws) * 100 : 0 };
      });

      rankedStudents = rankedStudents.filter(st => st.completed > 0).sort((a, b) => b.completed - a.completed).slice(0, 10);

      return (
        <div className="bento-card overflow-hidden h-full flex flex-col">
          <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-gradient-to-r from-yellow-50 to-transparent">
            <div className="flex items-center">
               <i className="ph-fill ph-trophy text-2xl text-yellow-500 mr-2"></i>
               <div>
                  <h3 className="font-black text-lg text-slate-900">Top 10 ประจำเดือน</h3>
                  <p className="text-[10px] text-slate-500 font-bold uppercase tracking-wider">{monthNames[currentMonth]} {currentYear + 543}</p>
               </div>
            </div>
          </div>
          <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
            {totalMonthlyHws === 0 ? (
               <div className="flex flex-col items-center justify-center h-full opacity-50 py-10"><i className="ph-fill ph-star text-4xl text-slate-300 mb-2"></i><p className="text-slate-500 font-bold text-sm">ยังไม่มีการบ้านในเดือนนี้</p></div>
            ) : rankedStudents.length === 0 ? (
               <div className="flex flex-col items-center justify-center h-full opacity-50 py-10"><i className="ph-fill ph-tray text-4xl text-slate-300 mb-2"></i><p className="text-slate-500 font-bold text-sm">ยังไม่มีใครส่งงานเลย</p></div>
            ) : (
               <div className="space-y-2">
                 {rankedStudents.map((st, idx) => {
                   const rank = idx + 1;
                   let rankStyle = "bg-white border-slate-100";
                   let rankIcon = <span className="font-black text-slate-400 w-6 text-center">{rank}</span>;
                   
                   if (rank === 1) { rankStyle = "bg-gradient-to-r from-yellow-50 to-amber-50 border-yellow-200 shadow-sm"; rankIcon = <i className="ph-fill ph-crown text-xl text-yellow-500 mx-auto"></i>; } 
                   else if (rank === 2) { rankStyle = "bg-gradient-to-r from-slate-50 to-gray-50 border-slate-200"; rankIcon = <i className="ph-fill ph-medal text-xl text-slate-400 mx-auto"></i>; } 
                   else if (rank === 3) { rankStyle = "bg-gradient-to-r from-orange-50 to-orange-100/50 border-orange-200"; rankIcon = <i className="ph-fill ph-medal text-xl text-orange-600 mx-auto"></i>; }

                   return (
                     <div key={st.id} className={`flex items-center p-3 rounded-xl border ${rankStyle}`}>
                        <div className="w-8 flex-shrink-0 flex justify-center mr-2">{rankIcon}</div>
                        <div className="flex-1 min-w-0">
                           <p className={`font-bold truncate text-sm ${rank <= 3 ? 'text-slate-900' : 'text-slate-700'}`}>{st.name}</p>
                           <p className="text-[10px] text-slate-500">สำเร็จ {st.completed}/{totalMonthlyHws} งาน</p>
                        </div>
                        <div className="flex-shrink-0 ml-2">
                           <span className={`text-xs font-black px-2 py-1 rounded-md ${st.percent === 100 ? 'bg-green-100 text-green-700' : 'bg-blue-50 text-blue-700'}`}>
                             {Math.round(st.percent)}%
                           </span>
                        </div>
                     </div>
                   )
                 })}
               </div>
            )}
          </div>
        </div>
      );
    }

    function RepDashboard({ homeworks, submissions, setHomeworks, setSubmissions, saveData, students, user }) {
      const [subject, setSubject] = useState('');
      const [assignDate, setAssignDate] = useState(new Date().toISOString().split('T')[0]);
      const [dueDate, setDueDate] = useState('');
      const [detail, setDetail] = useState('');
      const [editingId, setEditingId] = useState(null);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (editingId) {
          const updatedHw = { id: editingId, subject, assignDate, dueDate, detail };
          setHomeworks(prev => prev.map(hw => hw.id === editingId ? updatedHw : hw));
          saveData("updateHomework", updatedHw); setEditingId(null);
        } else {
          const newHw = { id: "HW_" + Date.now(), subject, assignDate, dueDate, detail };
          setHomeworks(prev => [...prev, newHw]); saveData("addHomework", newHw); 
        }
        setSubject(''); setDueDate(''); setDetail('');
      };

      const handleEditClick = (hw) => {
        setEditingId(hw.id); setSubject(hw.subject); setAssignDate(parseDateToYMD(hw.assignDate)); setDueDate(parseDateToYMD(hw.dueDate)); setDetail(hw.detail);
        window.scrollTo({ top: 0, behavior: 'smooth' }); 
      };

      const cancelEdit = () => { setEditingId(null); setSubject(''); setDueDate(''); setDetail(''); };
      const approve = (hwId, studentId) => {
        setSubmissions(prev => {
          const exist = prev.find(s => s.hwId === hwId && s.studentId === studentId);
          if(exist) return prev.map(s => s.hwId === hwId && s.studentId === studentId ? {...s, status: 'approved'} : s);
          return [...prev, {hwId, studentId, status: 'approved'}];
        });
        saveData("addSubmission", {hwId, studentId, status: 'approved'});
      };

      const pendingList = submissions.filter(s => s.status === 'pending');

      return (
        <div className="space-y-6">
          <div className="mb-6 animate-fade-in"><h2 className="text-3xl font-black text-slate-900">จัดการการบ้าน</h2><p className="text-slate-500 mt-1">เพิ่ม สั่งงาน และอนุมัติการส่งงานของเพื่อน</p></div>
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div className="lg:col-span-8 bento-card p-6 sm:p-8 animate-fade-in delay-100">
              <div className="flex items-center justify-between mb-8 pb-4 border-b border-slate-100">
                 <div className="flex items-center">
                   <div className="bg-blue-50 text-blue-600 w-10 h-10 rounded-xl flex items-center justify-center mr-4">{editingId ? <i className="ph-bold ph-pencil-simple text-xl"></i> : <i className="ph-bold ph-plus text-xl"></i>}</div>
                   <h3 className="text-xl font-black text-slate-800">{editingId ? 'แก้ไขงานที่สั่ง' : 'สั่งการบ้านใหม่'}</h3>
                 </div>
                 {editingId && <button onClick={cancelEdit} className="text-slate-400 hover:text-slate-800 bg-slate-50 w-8 h-8 rounded-full flex items-center justify-center border border-slate-200"><i className="ph-bold ph-x text-sm"></i></button>}
              </div>
              <form onSubmit={handleSubmit} className="space-y-5">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                  <div><label className="text-xs font-bold text-slate-500 mb-2 block">วิชา</label><select value={subject} onChange={e=>setSubject(e.target.value)} required className="w-full p-3.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-colors font-semibold"><option value="">-- เลือกวิชา --</option>{SUBJECTS.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                  <div><label className="text-xs font-bold text-slate-500 mb-2 block">วันที่สั่ง</label><input type="date" value={assignDate} onChange={e=>setAssignDate(e.target.value)} required className="w-full p-3.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-colors font-semibold" /></div>
                </div>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-5">
                  <div className="sm:col-span-2"><label className="text-xs font-bold text-slate-500 mb-2 block">รายละเอียดงาน</label><input type="text" value={detail} onChange={e=>setDetail(e.target.value)} required placeholder="เช่น ทำแบบฝึกหัดหน้า 20" className="w-full p-3.5 border border-slate-200 rounded-xl bg-slate-50 focus:bg-white focus:border-blue-500 outline-none transition-colors font-semibold" /></div>
                  <div><label className="text-xs font-bold text-orange-600 mb-2 block">กำหนดส่ง (Deadline)</label><input type="date" value={dueDate} onChange={e=>setDueDate(e.target.value)} required className="w-full p-3.5 border border-orange-200 rounded-xl bg-orange-50 text-orange-700 focus:bg-white focus:border-orange-500 outline-none transition-colors font-bold" /></div>
                </div>
                <div className="pt-4 flex gap-3"><button type="submit" className={`flex-1 sm:flex-none text-white px-8 py-3.5 rounded-xl font-bold transition-all active:scale-95 flex items-center justify-center ${editingId ? 'bg-slate-800 hover:bg-slate-900 shadow-md' : 'bg-blue-600 hover:bg-blue-700 shadow-md shadow-blue-600/20'}`}><i className="ph-fill ph-floppy-disk text-sm mr-2"></i> {editingId ? 'บันทึกการแก้ไข' : 'ประกาศงานให้เพื่อน'}</button></div>
              </form>
            </div>
            <div className="lg:col-span-4 bento-card p-6 sm:p-8 flex flex-col h-full animate-fade-in delay-200">
              <div className="flex items-center justify-between mb-6 pb-4 border-b border-slate-100">
                 <div className="flex items-center"><div className="bg-orange-50 text-orange-600 w-10 h-10 rounded-xl flex items-center justify-center mr-3"><i className="ph-fill ph-clock text-xl"></i></div><h3 className="text-lg font-black text-slate-800">รอตรวจ</h3></div>
                 <span className="bg-orange-100 text-orange-700 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">{pendingList.length}</span>
              </div>
              <div className="flex-1 space-y-3 overflow-y-auto pr-2 max-h-[400px] no-scrollbar">
                {pendingList.length === 0 ? (
                   <div className="h-full flex flex-col items-center justify-center text-center py-8 opacity-50"><i className="ph-fill ph-check-circle text-5xl text-slate-300 mb-3"></i><p className="text-slate-500 font-bold text-sm">ตรวจงานครบหมดแล้ว</p></div>
                ) : (
                  pendingList.map(p => {
                    const student = students.find(s => s.id === String(p.studentId));
                    const hw = homeworks.find(h => h.id === p.hwId);
                    return (
                      <div key={p.studentId+p.hwId} className="bg-white p-3.5 rounded-2xl flex justify-between items-center border border-slate-100 shadow-sm">
                        <div className="text-sm pr-2"><p className="font-black text-slate-900">{student?.name || p.studentId}</p><p className="text-[11px] font-bold text-slate-400 mt-0.5 truncate max-w-[150px]">{hw?.subject}</p></div>
                        <button onClick={() => approve(p.hwId, p.studentId)} className="bg-slate-50 text-blue-600 w-10 h-10 rounded-xl hover:bg-blue-600 hover:text-white transition-colors border border-slate-200 flex items-center justify-center flex-shrink-0"><i className="ph-bold ph-check text-xl"></i></button>
                      </div>
                    )
                  })
                )}
              </div>
            </div>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fade-in delay-200">
            <div className="lg:col-span-8 bento-card overflow-hidden">
              <div className="p-6 sm:p-8 border-b border-slate-100 flex items-center"><div className="bg-blue-50 p-2.5 rounded-xl mr-3"><i className="ph-bold ph-list text-xl text-blue-600"></i></div><h2 className="font-black text-slate-900 text-xl">รายการงานทั้งหมด</h2></div>
              <div className="overflow-x-auto p-4 sm:p-6 pt-0">
                <table className="w-full text-left whitespace-nowrap border-separate border-spacing-y-2"><thead className="text-slate-400 text-[11px] font-bold"><tr><th className="px-4 py-2">วิชา / รายละเอียด</th><th className="px-4 py-2 text-center">กำหนดส่ง</th><th className="px-4 py-2 text-center">สถานะ</th><th className="px-4 py-2 min-w-[200px]">รายชื่อคนค้างส่ง</th><th className="px-4 py-2 text-center">จัดการ</th></tr></thead><tbody>
                  {homeworks.sort((a,b)=> new Date(b.assignDate) - new Date(a.assignDate)).map(hw => {
                    const approvedCount = submissions.filter(s => s.hwId === hw.id && s.status === 'approved').length;
                    const totalStudents = students.length;
                    const isComplete = approvedCount >= totalStudents && totalStudents > 0;
                    
                    // หาเพื่อนที่ยังไม่ส่งงาน
                    const sentIds = submissions.filter(s => String(s.hwId) === String(hw.id) && s.status === 'approved').map(s => String(s.studentId));
                    const missings = students.filter(st => !sentIds.includes(String(st.id)));

                    return (
                      <tr key={hw.id} className="bg-white hover:bg-slate-50 transition-colors rounded-2xl">
                        <td className="px-4 py-4 rounded-l-2xl border-y border-l border-slate-100"><p className="font-black text-slate-900 mb-1">{hw.subject}</p><p className="text-slate-500 text-xs truncate max-w-[250px]">{hw.detail}</p></td>
                        <td className="px-4 py-4 text-center border-y border-slate-100"><span className="font-bold text-orange-600 bg-orange-50 px-3 py-1.5 rounded-lg border border-orange-100 text-xs inline-block">{new Date(hw.dueDate).toLocaleDateString('th-TH', {day:'numeric', month:'short'})}</span></td>
                        <td className="px-4 py-4 text-center border-y border-slate-100">{isComplete ? <span className="text-blue-600 font-bold text-sm flex items-center justify-center"><i className="ph-fill ph-check-circle text-lg mr-1"></i> ส่งครบ</span> : <span className="text-slate-900 font-black text-sm">{approvedCount} <span className="text-slate-400 text-xs">/ {totalStudents}</span></span>}</td>
                        <td className="px-4 py-4 whitespace-normal border-y border-slate-100">
                          {isComplete ? (
                            <span className="text-xs text-slate-400 font-medium">- ไม่มี -</span>
                          ) : (
                            <div className="flex flex-wrap gap-1.5 max-w-[250px]">
                              {missings.map(st => (
                                <span key={st.id} className="bg-red-50 border border-red-100 text-red-600 px-2 py-1 rounded-md text-[10px] font-bold shadow-sm whitespace-nowrap">
                                  {st.name.split(' ')[0]}
                                </span>
                              ))}
                            </div>
                          )}
                        </td>
                        <td className="px-4 py-4 text-center rounded-r-2xl border-y border-r border-slate-100"><button onClick={() => handleEditClick(hw)} className="bg-white border border-slate-200 text-slate-500 hover:text-slate-900 w-8 h-8 rounded-full flex items-center justify-center mx-auto transition-all shadow-sm"><i className="ph-bold ph-pencil-simple text-sm"></i></button></td>
                      </tr>
                    )
                  })}
                </tbody></table>
              </div>
            </div>
            <div className="lg:col-span-4"><MonthlyLeaderboard homeworks={homeworks} submissions={submissions} students={students} /></div>
          </div>
        </div>
      );
    }

    function StudentDashboard({ user, homeworks, submissions, setSubmissions, saveData, students }) {
      const submitWork = (hwId) => {
        setSubmissions(prev => [...prev, {hwId: hwId, studentId: String(user.id), status: 'pending'}]);
        saveData("addSubmission", {hwId: hwId, studentId: String(user.id), status: 'pending'});
      };

      const sortedHomeworks = [...homeworks].sort((a, b) => {
         const subA = submissions.find(s => s.hwId === a.id && s.studentId === String(user.id))?.status || 'missing';
         const subB = submissions.find(s => s.hwId === b.id && s.studentId === String(user.id))?.status || 'missing';
         const statusWeight = { 'missing': 0, 'pending': 1, 'approved': 2 };
         if (statusWeight[subA] !== statusWeight[subB]) return statusWeight[subA] - statusWeight[subB];
         return new Date(a.dueDate) - new Date(b.dueDate);
      });

      const missingCount = sortedHomeworks.filter(hw => !submissions.find(s => s.hwId === hw.id && s.studentId === String(user.id))).length;
      const doneCount = submissions.filter(s => s.studentId === String(user.id) && s.status === 'approved').length;
      const rankInfo = getStudentRankInfo(user.id, homeworks, submissions);

      return (
        <div className="space-y-6">
          <div className="bento-card p-6 sm:p-10 flex flex-col sm:flex-row justify-between items-center gap-6 animate-fade-in relative overflow-hidden">
            <div className="absolute right-0 top-0 w-64 h-64 bg-blue-100/50 rounded-full blur-3xl -z-10 translate-x-1/3 -translate-y-1/3"></div>
            <div><h2 className="text-3xl sm:text-4xl font-black text-slate-900 mb-2">ภาพรวมการเรียน</h2><p className="text-slate-500 font-medium">จัดการภารกิจ และงานที่ต้องส่งของคุณ</p></div>
            <div className="flex gap-3 sm:gap-4 w-full sm:w-auto">
               <div className="flex-1 sm:flex-none flex flex-col justify-center px-6 py-4 bg-white rounded-2xl border border-slate-100 shadow-sm text-center">
                  <p className="text-xs text-blue-600 font-bold mb-1">ฉายาเดือนนี้</p>
                  <div className="flex items-center justify-center gap-1.5">{rankInfo.icon}<p className="text-xl font-black text-slate-900 truncate max-w-[120px] sm:max-w-none">{rankInfo.title}</p></div>
               </div>
               <div className="flex-1 sm:flex-none flex flex-col justify-center px-6 py-4 bg-white rounded-2xl border border-rose-100 shadow-sm text-center min-w-[100px]">
                  <p className="text-xs text-rose-500 font-bold mb-1">ค้างส่ง</p><p className="text-3xl font-black text-slate-900">{missingCount}</p>
               </div>
            </div>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fade-in delay-100">
            <div className="lg:col-span-8 bento-card overflow-hidden">
              <div className="p-6 border-b border-slate-100 flex items-center"><i className="ph-fill ph-book-open text-xl text-blue-600 mr-2"></i><h3 className="font-black text-xl text-slate-900">ภารกิจของคุณ</h3></div>
              {sortedHomeworks.length === 0 ? (
                <div className="text-center py-20 px-4"><div className="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-100"><i className="ph-fill ph-check-circle text-5xl text-slate-300"></i></div><p className="text-2xl font-black text-slate-900 mb-2">ยอดเยี่ยมมาก!</p><p className="text-slate-500 font-medium text-sm">ไม่มีงานค้างในระบบ พักผ่อนได้เลย</p></div>
              ) : (
                <div className="p-4 sm:p-6 space-y-3">
                  {sortedHomeworks.map((hw) => {
                    const sub = submissions.find(s => String(s.hwId) === String(hw.id) && String(s.studentId) === String(user.id));
                    const status = sub ? sub.status : 'missing';
                    return (
                      <div key={hw.id} className={`flex flex-col sm:flex-row justify-between items-start sm:items-center p-5 rounded-2xl border transition-all ${status==='missing' ? 'bg-white border-slate-200 shadow-sm hover:shadow-md' : status==='pending' ? 'bg-slate-50 border-slate-100' : 'bg-transparent border-slate-100 opacity-60'}`}>
                        <div className="flex-1 mb-4 sm:mb-0 pr-4">
                           <p className={`font-black text-lg mb-1 ${status==='approved'?'text-slate-400 line-through':'text-slate-900'}`}>{hw.subject}</p>
                           <p className={`text-sm mb-3 font-medium ${status==='approved'?'text-slate-400':'text-slate-500'}`}>{hw.detail}</p>
                           <span className={`text-xs font-bold px-2.5 py-1 rounded-md border ${status==='missing'?'text-orange-600 bg-orange-50 border-orange-100':'text-slate-500 bg-white border-slate-200'}`}>กำหนดส่ง: {new Date(hw.dueDate).toLocaleDateString('th-TH', {day:'numeric', month:'short'})}</span>
                        </div>
                        <div className="w-full sm:w-auto">
                          {status === 'missing' && <button onClick={() => submitWork(hw.id)} className="w-full sm:w-auto bg-slate-900 hover:bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-md transition-all active:scale-95 flex items-center justify-center text-sm">ส่งงาน <i className="ph-fill ph-paper-plane-right text-lg ml-2"></i></button>}
                          {status === 'pending' && <div className="w-full sm:w-auto bg-white border border-slate-200 text-slate-600 px-6 py-3 rounded-xl font-bold flex items-center justify-center text-sm"><i className="ph-fill ph-clock text-xl mr-2 text-slate-400 animate-pulse"></i> รอตรวจ</div>}
                          {status === 'approved' && <div className="w-full sm:w-auto text-blue-600 font-black flex items-center justify-center text-sm py-3 px-2"><i className="ph-fill ph-check-circle text-xl mr-2"></i> ส่งแล้ว</div>}
                        </div>
                      </div>
                    )
                  })}
                </div>
              )}
            </div>
            <div className="lg:col-span-4"><MonthlyLeaderboard homeworks={homeworks} submissions={submissions} students={students} /></div>
          </div>
        </div>
      );
    }

    function TeacherDashboard({ homeworks, submissions, students }) {
      const sortedHomeworks = [...homeworks].sort((a, b) => new Date(b.assignDate) - new Date(a.assignDate));
      return (
        <div className="space-y-6">
          <div className="bento-card p-6 sm:p-10 flex flex-col sm:flex-row justify-between items-center gap-6 animate-fade-in relative overflow-hidden">
             <div className="absolute right-0 top-0 w-64 h-64 bg-indigo-100/40 rounded-full blur-3xl -z-10 translate-x-1/3 -translate-y-1/3"></div>
             <div><h2 className="text-3xl sm:text-4xl font-black text-slate-900 mb-2">สรุปการส่งงาน</h2><p className="text-slate-500 font-medium">ภาพรวมการส่งการบ้านของนักเรียน ม. 4/8</p></div>
             <div className="flex flex-col justify-center px-8 py-5 bg-white rounded-2xl border border-slate-100 shadow-sm text-center w-full sm:w-auto"><p className="text-xs text-blue-600 font-bold mb-1">จำนวนนักเรียนทั้งหมด</p><p className="text-4xl font-black text-slate-900">{students.length} <span className="text-base font-bold text-slate-400">คน</span></p></div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fade-in delay-100">
            <div className="lg:col-span-8 bento-card overflow-hidden">
              <div className="p-6 border-b border-slate-100 flex items-center"><i className="ph-bold ph-trend-up text-xl text-blue-600 mr-2"></i><h3 className="font-black text-xl text-slate-900">รายละเอียดแต่ละวิชา</h3></div>
              <div className="overflow-x-auto p-4 sm:p-6">
                <table className="w-full text-left whitespace-nowrap border-separate border-spacing-y-3">
                  <thead className="text-slate-400 font-bold text-xs"><tr><th className="px-5 py-2">งานที่สั่ง</th><th className="px-5 py-2 text-center w-32">กำหนดส่ง</th><th className="px-5 py-2 text-center w-48">สถานะ</th><th className="px-5 py-2 min-w-[300px]">รายชื่อคนค้างส่ง</th></tr></thead>
                  <tbody>
                    {sortedHomeworks.map(hw => {
                      const sentIds = submissions.filter(s => String(s.hwId) === String(hw.id) && s.status === 'approved').map(s => String(s.studentId));
                      const missings = students.filter(st => !sentIds.includes(String(st.id)));
                      const isComplete = missings.length === 0 && students.length > 0;
                      const percent = students.length > 0 ? (sentIds.length / students.length) * 100 : 0;
                      return (
                        <tr key={hw.id} className="bg-white hover:bg-slate-50 transition-colors shadow-sm rounded-2xl">
                          <td className="px-5 py-5 rounded-l-2xl border-y border-l border-slate-100"><p className="font-black text-slate-900 text-lg mb-1">{hw.subject}</p><p className="text-slate-500 text-sm whitespace-normal max-w-[200px]">{hw.detail}</p></td>
                          <td className="px-5 py-5 text-center border-y border-slate-100"><span className={`inline-block px-3 py-1.5 rounded-lg border font-bold text-xs ${isComplete ? 'bg-slate-50 border-slate-200 text-slate-500' : 'bg-orange-50 border-orange-100 text-orange-600'}`}>{new Date(hw.dueDate).toLocaleDateString('th-TH', {day:'numeric', month:'short'})}</span></td>
                          <td className="px-5 py-5 border-y border-slate-100">
                            <div className="flex flex-col pr-4">
                               <div className="flex justify-between items-end mb-1.5"><span className="font-black text-lg text-slate-900">{sentIds.length}/{students.length}</span><span className="text-slate-400 font-bold text-xs">{Math.round(percent)}%</span></div>
                               <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${isComplete ? 'bg-blue-500' : 'bg-slate-800'}`} style={{ width: `${percent}%` }}></div></div>
                            </div>
                          </td>
                          <td className="px-5 py-5 whitespace-normal rounded-r-2xl border-y border-r border-slate-100">
                            {isComplete ? (
                              <div className="inline-flex items-center text-blue-600 font-bold text-sm"><i className="ph-fill ph-check-circle text-lg mr-1.5"></i> ส่งครบทุกคน</div>
                            ) : (
                              <div className="flex flex-wrap gap-1.5 max-w-[300px]">
                                {missings.map(st => (
                                  <span key={st.id} className="bg-white border border-slate-200 text-slate-600 px-2 py-1 rounded-md text-[10px] font-bold shadow-sm whitespace-nowrap">
                                    {st.name.split(' ')[0]}
                                  </span>
                                ))}
                              </div>
                            )}
                          </td>
                        </tr>
                      )
                    })}
                  </tbody>
                </table>
              </div>
            </div>
            <div className="lg:col-span-4"><MonthlyLeaderboard homeworks={homeworks} submissions={submissions} students={students} /></div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
